version: "2"
run:
  timeout: 10m
linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - gocyclo
    - gocritic
    - godot
    - gomodguard
    - gosec
    - govet
    - ineffassign
    - ireturn
    - lll
    - misspell
    - nakedret
    - nolintlint
    - revive
    - staticcheck
    - testifylint
    - unconvert
    - unparam
    - unused
  settings:
    gocritic:
      disabled-checks:
        - captLocal
        - unslice
    gocyclo:
      min-complexity: 75
    ireturn:
      allow:
        - error
        - generic
        - stdlib
        - Term
    lll:
      line-length: 200
    mnd:
      ignored-numbers:
        - "0"
        - "1"
        - "2"
    revive:
      rules:
        - name: var-naming
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - lll
        path: _test\.go
      - linters:
          - gocritic
        path: binding.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
